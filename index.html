<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sizzer | Independent Music Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <div class="site-wrapper">
        <header class="header">
            <div class="logo">
                <h1>SIZZER</h1>
            </div>
            <button class="mobile-toggle" id="mobile-menu-btn" aria-label="Menu" type="button">
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="#work" class="nav-elem">WORK</a>
                <a href="#about" class="nav-elem">ABOUT</a>
                <a href="#publications" class="nav-elem">PUBLICATIONS</a>
                <a href="#office" class="nav-elem">OFFICE</a>
            </nav>
        </header>

        <main class="hero-scene">
            <div class="carousel" id="carousel"></div>
            <div class="scene-overlay left-fade"></div>
            <div class="scene-overlay right-fade"></div>
        </main>

        <section class="scroll-sequence-wrapper" id="experiencia">
            <div class="scroll-sequence-sticky">
                <div class="section-bg">
                    <div class="bg-layer" data-card="1" style="background-image: url('./images/card1-bg.jpg')"></div>
                    <div class="bg-layer" data-card="2" style="background-image: url('./images/card2-bg.jpg')"></div>
                    <div class="bg-layer" data-card="3" style="background-image: url('./images/card3.jpg')"></div>
                </div>
                <div class="statement-container cinematic-text">
                    <div class="line-container">
                        <h2 class="massive-text">VENHA</h2>
                    </div>
                    <div class="line-container has-sidetext">
                        <h2 class="massive-text">VIVER UMA</h2>
                        <div class="side-text">
                            <p>(CONCEPTS)</p>
                            <p>(IDEAS)</p>
                            <p>(MOTIVES)</p>
                        </div>
                    </div>
                    <div class="line-container">
                        <h2 class="massive-text"><span class="text-red">EXPERENCIA</span></h2>
                    </div>
                    <div class="line-container">
                        <h2 class="massive-text">UNICA COM <span class="text-red">CLÉ</span></h2>
                    </div>
                </div>
                <div class="three-cards-container">
                    <div class="label-bar section-label">
                        <div class="label-slot">
                            <span class="tray" data-active="true"></span>
                            <span class="tray" data-active="false"></span>
                        </div>
                        <div class="date-slot">
                            <span class="tray" data-active="true"></span>
                            <span class="tray" data-active="false"></span>
                        </div>
                    </div>
                    <div class="cards-grid">
                        <div class="card-wrapper">
                            <div class="event-card">
                                <img src="./images/card1.jpg" alt="Trap La Vida - Onde Viemos">
                            </div>
                            <a class="buy-ticket" href="#">COMPRAR INGRESSO</a>
                        </div>
                        <div class="card-wrapper">
                            <div class="event-card">
                                <img src="./images/card2.jpg" alt="Performer">
                            </div>
                            <a class="buy-ticket" href="#">COMPRAR INGRESSO</a>
                        </div>
                        <div class="card-wrapper">
                            <div class="event-card">
                                <img src="./images/card3.jpg" alt="Belo - Maputo Moçambique">
                            </div>
                            <a class="buy-ticket" href="#">COMPRAR INGRESSO</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- ARTIST DETAIL OVERLAY -->
    <div class="artist-modal" id="artist-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <!-- LEFT: escuro sobre o carrossel, com texto do artista -->
        <div class="artist-modal__left" id="modal-left">
            <!-- traço + nome do artista em vez do título grande -->
            <div class="artist-modal__nameblock">
                <div class="artist-modal__trac"></div>
                <p class="artist-modal__name" id="modal-name"></p>
            </div>
            <div class="artist-modal__spacer"></div>
            <nav class="artist-modal__links">
                <a class="artist-modal__navlink" href="#" id="modal-link-listen">
                    <span>Ouvir </span><strong class="navlink-name"></strong><span> agora</span>
                </a>
                <a class="artist-modal__navlink" href="#" id="modal-link-albums">
                    <span>Albuns do </span><strong class="navlink-name"></strong>
                </a>
            </nav>
            <a class="artist-modal__cta" href="#">Ouvir agora</a>

            <!-- Ícones das plataformas de streaming -->
            <div class="artist-modal__platforms">
              <!-- Spotify -->
              <a class="platform-icon" href="#" title="Spotify" aria-label="Spotify">
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="24" cy="24" r="21.5"/>

                </svg>
              </a>
              <!-- Deezer -->
              <a class="platform-icon" href="#" title="Deezer" aria-label="Deezer">
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="4.5"  y="29.88" width="9.75" height="5.88"/>
                  <rect x="14.25" y="29.88" width="9.75" height="5.88"/>
                  <rect x="24"   y="29.88" width="9.75" height="5.88"/>
                  <rect x="33.75" y="29.88" width="9.75" height="5.88"/>
                  <rect x="14.25" y="24"   width="9.75" height="5.88"/>
                  <rect x="24"   y="24"   width="9.75" height="5.88"/>
                  <rect x="33.75" y="24"   width="9.75" height="5.88"/>
                  <rect x="14.25" y="18.12" width="9.75" height="5.88"/>
                  <rect x="33.75" y="18.12" width="9.75" height="5.88"/>
                  <rect x="33.75" y="12.23" width="9.75" height="5.88"/>
                </svg>
              </a>
              <!-- Apple Music -->
              <a class="platform-icon platform-icon--wide" href="#" title="Apple Music" aria-label="Apple Music">
                <svg viewBox="0.5 0 328 85" xmlns="http://www.w3.org/2000/svg">
                  <g fill="#fff">
                    <path d="M52.244 41.844c-.104-6.346 2.637-11.286 8.217-14.822-3.147-4.576-7.788-7.148-13.925-7.723-2.183-.205-4.974.311-8.369 1.561-3.652 1.354-5.708 2.027-6.164 2.027-.964 0-2.815-.569-5.558-1.716-2.737-1.144-5.072-1.716-7-1.716-3.246.053-6.266.95-9.055 2.691-2.79 1.743-5.021 4.124-6.694 7.137C1.563 33.029.5 37.502.5 42.701c0 4.68.784 9.359 2.356 14.042 1.471 4.473 3.351 8.399 5.631 11.776 2.027 3.069 3.809 5.305 5.326 6.711 2.184 2.183 4.413 3.225 6.699 3.119 1.47-.054 3.396-.599 5.781-1.642 2.23-.983 4.464-1.478 6.697-1.478 2.079 0 4.233.492 6.468 1.478 2.484 1.043 4.515 1.562 6.087 1.562 2.334-.102 4.514-1.117 6.546-3.039.707-.627 1.482-1.484 2.318-2.576a79.861 79.861 0 0 0 2.779-3.9 57.237 57.237 0 0 0 2.093-3.51 35.298 35.298 0 0 0 1.864-3.979c.251-.572.479-1.156.684-1.754.202-.598.405-1.207.608-1.832-1.877-.83-3.577-2.005-5.098-3.514-3.344-3.323-5.044-7.433-5.095-12.321zM107.421 55.75h-.369L91.599 20.436H79.464v56.977H90.04V40.512h.491l12.914 29.302h7.417l12.873-29.302h.493v36.901h10.698V20.436h-12.052zM42.654 12.982c2.69-3.381 4.035-7.021 4.035-10.922v-.779c0-.262-.026-.521-.076-.781-1.878.104-3.868.703-5.975 1.793-2.104 1.094-3.841 2.474-5.213 4.135-2.738 3.279-4.109 6.787-4.109 10.532v.739c0 .236.026.482.076.744 4.212.415 7.966-1.406 11.262-5.461zM258.534 20.436h11.887v56.978h-11.887zM306.323 29.493c7.05 0 10.778 5.427 10.778 11.271H328.5v-1.211c0-11.019-8.404-20.201-22.26-20.201-14.84 0-23.693 9.767-23.693 26.423v6.429c0 16.651 8.771 26.297 23.651 26.297 14.225 0 22.302-9.312 22.302-19.662v-1.252h-11.398c0 5.888-3.647 10.771-10.695 10.771-7.217 0-11.809-5.135-11.809-16.115v-6.424c0-10.942 4.634-16.326 11.725-16.326zM180.39 56.416c0 7.641-4.468 11.855-11.026 11.855-6.6 0-11.067-4.174-11.067-11.855v-35.98H146.49v37.65c0 12.15 8.607 20.414 22.872 20.414 14.225 0 22.873-8.264 22.873-20.414v-37.65H180.39v35.98zM231.564 44.229l-8.484-1.918c-5-1.047-7.624-3.258-7.624-6.557 0-4.381 3.565-7.137 9.307-7.137 6.476 0 9.714 3.715 10 7.723h11.068c-.                   </g>
                </svg>
              </a>
              <!-- YouTube Music -->
              <a class="platform-icon" href="#" title="YouTube Music" aria-label="YouTube Music">
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="24" cy="24" r="14"/>
                  <path d="M31,24,19,31V17Z"/>
                  <circle cx="24" cy="24" r="21.5"/>
                </svg>
              </a>
            </div>

            <div class="artist-modal__spacer"></div>
        </div>
        <!-- RIGHT: foto grande do artista, clique para fechar -->
        <div class="artist-modal__photo" id="modal-photo"></div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
