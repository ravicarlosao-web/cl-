<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sizzer | Independent Music Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <div class="site-wrapper">
        <header class="header">
            <div class="logo">
                <h1>SIZZER</h1>
            </div>
            <button class="mobile-toggle" id="mobile-menu-btn" aria-label="Menu" type="button">
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="#work" class="nav-elem">WORK</a>
                <a href="#about" class="nav-elem">ABOUT</a>
                <a href="#publications" class="nav-elem">PUBLICATIONS</a>
                <a href="#office" class="nav-elem">OFFICE</a>
            </nav>
        </header>

        <main class="hero-scene">
            <div class="carousel" id="carousel"></div>
            <div class="scene-overlay left-fade"></div>
            <div class="scene-overlay right-fade"></div>
        </main>

        <section class="scroll-sequence-wrapper" id="experiencia">
            <div class="scroll-sequence-sticky">
                <div class="section-bg">
                    <div class="bg-layer" data-card="1" style="background-image: url('./images/card1-bg.jpg')"></div>
                    <div class="bg-layer" data-card="2" style="background-image: url('./images/card2-bg.jpg')"></div>
                    <div class="bg-layer" data-card="3" style="background-image: url('./images/card3.jpg')"></div>
                </div>
                <div class="statement-container cinematic-text">
                    <div class="line-container">
                        <h2 class="massive-text">VENHA</h2>
                    </div>
                    <div class="line-container has-sidetext">
                        <h2 class="massive-text">VIVER UMA</h2>
                        <div class="side-text">
                            <p>(CONCEPTS)</p>
                            <p>(IDEAS)</p>
                            <p>(MOTIVES)</p>
                        </div>
                    </div>
                    <div class="line-container">
                        <h2 class="massive-text"><span class="text-red">EXPERENCIA</span></h2>
                    </div>
                    <div class="line-container">
                        <h2 class="massive-text">UNICA COM <span class="text-red">CLÉ</span></h2>
                    </div>
                </div>
                <div class="three-cards-container">
                    <div class="label-bar section-label">
                        <div class="label-slot">
                            <span class="tray" data-active="true"></span>
                            <span class="tray" data-active="false"></span>
                        </div>
                        <div class="date-slot">
                            <span class="tray" data-active="true"></span>
                            <span class="tray" data-active="false"></span>
                        </div>
                    </div>
                    <div class="cards-grid">
                        <div class="card-wrapper">
                            <div class="event-card">
                                <img src="./images/card1.jpg" alt="Trap La Vida - Onde Viemos">
                            </div>
                            <a class="buy-ticket" href="#">COMPRAR INGRESSO</a>
                        </div>
                        <div class="card-wrapper">
                            <div class="event-card">
                                <img src="./images/card2.jpg" alt="Performer">
                            </div>
                            <a class="buy-ticket" href="#">COMPRAR INGRESSO</a>
                        </div>
                        <div class="card-wrapper">
                            <div class="event-card">
                                <img src="./images/card3.jpg" alt="Belo - Maputo Moçambique">
                            </div>
                            <a class="buy-ticket" href="#">COMPRAR INGRESSO</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- ARTIST DETAIL OVERLAY -->
    <div class="artist-modal" id="artist-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <!-- LEFT: escuro sobre o carrossel, com texto do artista -->
        <div class="artist-modal__left" id="modal-left">
            <!-- traço + nome do artista em vez do título grande -->
            <div class="artist-modal__nameblock">
                <div class="artist-modal__trac"></div>
                <p class="artist-modal__name" id="modal-name"></p>
            </div>
            <div class="artist-modal__spacer"></div>
            <nav class="artist-modal__links">
                <a class="artist-modal__navlink" href="#" id="modal-link-listen">
                    <span>Ouvir </span><strong class="navlink-name"></strong><span> agora</span>
                </a>
                <a class="artist-modal__navlink" href="#" id="modal-link-albums">
                    <span>Albuns do </span><strong class="navlink-name"></strong>
                </a>
            </nav>
            <a class="artist-modal__cta" href="#">Ouvir agora</a>

            <!-- Ícones das plataformas de streaming -->
            <div class="artist-modal__platforms">
              <!-- Spotify -->
              <a class="platform-icon" href="#" title="Spotify" aria-label="Spotify">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                  <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
              </a>
              <!-- Deezer -->
              <a class="platform-icon" href="#" title="Deezer" aria-label="Deezer">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                  <path d="M18.03 11.4h2.22v1.32h-2.22zm0 2.12h2.22v1.32h-2.22zm0-4.24h2.22v1.32h-2.22zm0-2.16h2.22v1.32h-2.22zm-3.69 6.4h2.22v1.32h-2.22zm0-2.12h2.22v1.32h-2.22zm0-2.12h2.22v1.32h-2.22zm-3.69 4.24h2.22v1.32h-2.22zm0-2.12h2.22v1.32h-2.22zm-3.69 2.12h2.22v1.32H7.02zm-3.69 0h2.22v1.32H3.33zm0 2.12h2.22v1.32H3.33zm3.69 0h2.22v1.32H7.02zm3.69 0h2.22v1.32h-2.22zm3.69 0h2.22v1.32h-2.22zm3.69 0h2.22v1.32h-2.22z"/>
                </svg>
              </a>
              <!-- Apple Music -->
              <a class="platform-icon" href="#" title="Apple Music" aria-label="Apple Music">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                  <path d="M23.994 6.124a9.23 9.23 0 00-.24-2.19c-.317-1.31-1.062-2.31-2.18-3.043a5.022 5.022 0 00-1.769-.73 7.32 7.32 0 00-1.164-.17 1.31 1.31 0 00-.19-.017H5.549a5.28 5.28 0 00-.57.041 7.49 7.49 0 00-1.394.269C2.28 .694 1.382 1.5.774 2.65A5.17 5.17 0 00.28 4.14 9.2 9.2 0 00.006 6.18v11.628a9.16 9.16 0 00.24 2.19c.317 1.31 1.062 2.31 2.18 3.043a5.022 5.022 0 001.769.73 7.32 7.32 0 001.164.17c.063.007.126.01.19.017h12.902a5.28 5.28 0 00.57-.041 7.49 7.49 0 001.394-.27c1.305-.424 2.203-1.23 2.811-2.38a5.17 5.17 0 00.494-1.49 9.2 9.2 0 00.274-2.04V6.124zm-7.453 1.26l-4.303.78v5.648a2.35 2.35 0 01-.048.55 1.68 1.68 0 01-1.304 1.32 2.98 2.98 0 01-.783.065 2.08 2.08 0 01-1.976-1.384 1.74 1.74 0 01.264-1.636 2.14 2.14 0 011.107-.77 4.52 4.52 0 01.917-.173 5.86 5.86 0 00.623-.094V8.034l-.001-.16v-.25a.54.54 0 01.437-.544l4.617-.836a.44.44 0 01.518.44v.842a.44.44 0 01-.068.252.43.43 0 01-.376.212l-.624.39z"/>
                </svg>
              </a>
              <!-- YouTube Music -->
              <a class="platform-icon" href="#" title="YouTube Music" aria-label="YouTube Music">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                  <path d="M12 0C5.376 0 0 5.376 0 12s5.376 12 12 12 12-5.376 12-12S18.624 0 12 0zm0 19.2c-3.978 0-7.2-3.222-7.2-7.2S8.022 4.8 12 4.8s7.2 3.222 7.2 7.2-3.222 7.2-7.2 7.2zm-1.44-4.378l4.378-2.822-4.378-2.822v5.644zm.72-11.142c-3.29 0-5.96 2.67-5.96 5.96h1.2c0-2.626 2.134-4.76 4.76-4.76V3.68zm0 1.56c-2.43 0-4.4 1.97-4.4 4.4h1.2c0-1.766 1.434-3.2 3.2-3.2V5.24z"/>
                </svg>
              </a>
            </div>

            <div class="artist-modal__spacer"></div>
        </div>
        <!-- RIGHT: foto grande do artista, clique para fechar -->
        <div class="artist-modal__photo" id="modal-photo"></div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
